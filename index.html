<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Hall of Fame Deportivo</title>
    <style>
        :root {
            --verde: #00ff87;
            --oscuro: #0a0e1a;
            --gris: #111827;
            --gris2: #1f2937;
            --texto: #e5e7eb;
            --acento: #00ff87;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--oscuro);
            color: var(--texto);
            font-family: 'Barlow', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Fondo con líneas de cancha */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,135,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,135,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .badge-top {
            display: inline-block;
            background: var(--verde);
            color: var(--oscuro);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 3px;
            padding: 4px 16px;
            border-radius: 2px;
            margin-bottom: 16px;
            animation: fadeDown 0.6s ease both;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.8rem, 8vw, 4.5rem);
            line-height: 1;
            letter-spacing: 2px;
            color: #fff;
            animation: fadeDown 0.6s 0.1s ease both;
        }

        h1 span { color: var(--verde); }

        .subtitle {
            margin-top: 10px;
            color: #6b7280;
            font-size: 0.95rem;
            animation: fadeDown 0.6s 0.2s ease both;
        }

        /* Tarjeta del formulario */
        .card-form {
            background: var(--gris);
            border: 1px solid rgba(0,255,135,0.15);
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 0 60px rgba(0,255,135,0.05);
            animation: fadeUp 0.7s 0.3s ease both;
        }

        .form-label {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        .form-control, .form-select {
            background: var(--gris2);
            border: 1px solid #374151;
            color: var(--texto);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Barlow', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus, .form-select:focus {
            background: var(--gris2);
            border-color: var(--verde);
            box-shadow: 0 0 0 3px rgba(0,255,135,0.12);
            color: #fff;
            outline: none;
        }

        .form-control::placeholder { color: #4b5563; }

        /* Selector de deporte con íconos */
        .sport-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 4px;
        }

        .sport-btn {
            background: var(--gris2);
            border: 1px solid #374151;
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #9ca3af;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sport-btn .icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }

        .sport-btn:hover {
            border-color: var(--verde);
            color: var(--verde);
            transform: translateY(-2px);
        }

        .sport-btn.active {
            border-color: var(--verde);
            background: rgba(0,255,135,0.1);
            color: var(--verde);
        }

        input[name="deporte"] { display: none; }

        /* Rating de admiración */
        .stars {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .star {
            font-size: 1.8rem;
            cursor: pointer;
            color: #374151;
            transition: color 0.15s, transform 0.15s;
            line-height: 1;
        }

        .star:hover, .star.active { color: #fbbf24; transform: scale(1.2); }

        input[name="admiracion"] { display: none; }

        /* Contador de caracteres */
        .char-count {
            font-size: 0.72rem;
            color: #4b5563;
            text-align: right;
            margin-top: 4px;
            transition: color 0.2s;
        }

        .char-count.warn { color: #f59e0b; }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid #1f2937;
            margin: 28px 0;
        }

        /* Botón submit */
        .btn-submit {
            width: 100%;
            background: var(--verde);
            color: var(--oscuro);
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            background: #00e87a;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,255,135,0.3);
        }

        .btn-submit:active { transform: translateY(0); }

        /* Link a lista */
        .link-lista {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #4b5563;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .link-lista:hover { color: var(--verde); }
        .link-lista span { color: var(--verde); }

        /* Animaciones */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card-form { padding: 24px 18px; }
            .sport-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <div class="header">
        <div class="badge-top">⚡ Hall of Fame</div>
        <h1>TU ÍDOLO<br><span>DEPORTIVO</span></h1>
        <p class="subtitle">Registra al deportista o equipo que más admiras</p>
    </div>

    <div class="card-form">
        <form action="logica.php" method="post" id="mainForm">

            <!-- Nombre -->
            <div class="mb-4">
                <label class="form-label">Tu nombre completo</label>
                <input type="text" name="nombres" class="form-control" placeholder="Ej: Carlos Andrés Pérez" required maxlength="200">
            </div>

            <!-- Deportista -->
            <div class="mb-4">
                <label class="form-label">Deportista o equipo favorito</label>
                <input type="text" name="deportista" class="form-control" placeholder="Ej: Lionel Messi / Real Madrid" required maxlength="200">
            </div>

            <!-- País -->
            <div class="mb-4">
                <label class="form-label">País o nacionalidad</label>
                <input type="text" name="pais" class="form-control" placeholder="Ej: Argentina" required maxlength="100">
            </div>

            <hr class="divider">

            <!-- Selector de deporte -->
            <div class="mb-4">
                <label class="form-label">Deporte</label>
                <div class="sport-grid">
                    <div class="sport-btn" onclick="selectSport(this, 'Fútbol')">
                        <span class="icon">⚽</span>Fútbol
                    </div>
                    <div class="sport-btn" onclick="selectSport(this, 'Baloncesto')">
                        <span class="icon">🏀</span>Baloncesto
                    </div>
                    <div class="sport-btn" onclick="selectSport(this, 'Tenis')">
                        <span class="icon">🎾</span>Tenis
                    </div>
                    <div class="sport-btn" onclick="selectSport(this, 'Natación')">
                        <span class="icon">🏊</span>Natación
                    </div>
                    <div class="sport-btn" onclick="selectSport(this, 'Atletismo')">
                        <span class="icon">🏃</span>Atletismo
                    </div>
                    <div class="sport-btn" onclick="selectSport(this, 'Otro')">
                        <span class="icon">🏅</span>Otro
                    </div>
                </div>
                <input type="text" name="deporte" id="deporteInput" required>
            </div>

            <!-- Logro más recordado -->
            <div class="mb-4">
                <label class="form-label">Logro más recordado</label>
                <input type="text" name="logro" class="form-control" placeholder="Ej: Copa del Mundo 2022" required maxlength="200">
            </div>

            <!-- Por qué lo admiras -->
            <div class="mb-4">
                <label class="form-label">¿Por qué lo admiras?</label>
                <textarea name="razon" class="form-control" rows="3" maxlength="300"
                    placeholder="Describe en pocas palabras qué hace especial a tu ídolo..."
                    oninput="updateCount(this)" required></textarea>
                <div class="char-count" id="charCount">0 / 300</div>
            </div>

            <!-- Nivel de admiración -->
            <div class="mb-4">
                <label class="form-label">Nivel de admiración</label>
                <div class="stars" id="stars">
                    <span class="star" onclick="setRating(1)">★</span>
                    <span class="star" onclick="setRating(2)">★</span>
                    <span class="star" onclick="setRating(3)">★</span>
                    <span class="star" onclick="setRating(4)">★</span>
                    <span class="star" onclick="setRating(5)">★</span>
                </div>
                <input type="hidden" name="admiracion" id="admiracionInput" value="0">
            </div>

            <hr class="divider">

            <button type="submit" class="btn-submit">
                🏆 Registrar mi ídolo
            </button>
        </form>

        <a href="lista.php" class="link-lista">Ver el <span>Hall of Fame completo →</span></a>
    </div>

</div>

<script>
    // Selector de deporte
    function selectSport(el, value) {
        document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('deporteInput').value = value;
    }

    // Estrellas de admiración
    function setRating(n) {
        const stars = document.querySelectorAll('.star');
        stars.forEach((s, i) => s.classList.toggle('active', i < n));
        document.getElementById('admiracionInput').value = n;
    }

    // Contador de caracteres
    function updateCount(el) {
        const count = el.value.length;
        const display = document.getElementById('charCount');
        display.textContent = count + ' / 300';
        display.classList.toggle('warn', count > 250);
    }

    // Validar antes de enviar
    document.getElementById('mainForm').addEventListener('submit', function(e) {
        const deporte = document.getElementById('deporteInput').value;
        const rating  = document.getElementById('admiracionInput').value;

        if (!deporte) {
            e.preventDefault();
            alert('Por favor selecciona un deporte.');
            return;
        }
        if (rating == 0) {
            e.preventDefault();
            alert('Por favor indica tu nivel de admiración con las estrellas.');
        }
    });
</script>

</body>
</html>
